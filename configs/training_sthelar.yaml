# -------------------------------------------------------------------------
# CellViT training configuration for STHELAR-converted datasets
# -------------------------------------------------------------------------
# Edit this file to define the CellViT-ready dataset path, model checkpoint,
# number of classes, training schedule, and logging paths.
#
# Example usage:
#   sbatch ruche/slurm_train.sh configs/training_sthelar.yaml
# -------------------------------------------------------------------------

adapters:
  adapter_type: all

logging:
  mode: "offline"
  project: "sthelar20x"
  notes: "CellViT fine-tuning on a STHELAR-converted CellViT-ready dataset"
  log_comment: "sthelar20x_experiment"

  tags:
    - "sthelar"
    - "20x"
    - "cellvit"

  # W&B offline directory.
  wandb_dir: "run/sthelar20x_experiment/wandb"

  # Internal experiment logs/checkpoints produced by the training code.
  log_dir: "run/sthelar20x_experiment/log"

  level: "debug"
  log_images: False

random_seed: 19
gpu: 0

data:
  dataset: "PanNuke"

  # Path to the dataset generated by convert_hf_to_cellvit.py.
  dataset_path: "/path/to/cellvit_ready/sthelar20x_dataset"

  # The converter writes train/valid/test split names.
  train_folds: ["train"]
  val_folds: ["valid"]
  test_folds: ["test"]

  # Must match nuclei_types in the preprocessing config.
  # Example:
  #   5-class grouped labels: Background + 4 classes => 5
  #   9-class raw labels: Background + 9 classes => 10
  #   Cancer/Normal: Background + Cancer + Normal => 3
  num_nuclei_classes: 5

  # STHELAR converter currently writes a single tissue type.
  num_tissue_classes: 1

  input_shape: 256

model:
  backbone: "SAM-H"

  # For CellViT-SAM-H-x20 pretrained checkpoint, keep this null.
  pretrained_encoder: null

  # Path relative to repository root, or absolute path.
  pretrained: "models/pretrained/CellViT-SAM-H-x20.pth"

  embed_dim: 1280
  input_channels: 3
  depth: 32
  num_heads: 16
  extract_layers: 4
  shared_decoders: False

training:
  batch_size: 4
  epochs: 1
  unfreeze_epoch: 2

  optimizer: "AdamW"
  optimizer_hyperparameter:
    lr: 0.0001
    betas: [0.85, 0.85]

  early_stopping_patience: 10

  scheduler:
    scheduler_type: "exponential"

  sampling_strategy: "cell"
  sampling_gamma: 0.85

  mixed_precision: True
  eval_every: 1

transformations:
  randomrotate90:
    p: 0.5
  horizontalflip:
    p: 0.5
  verticalflip:
    p: 0.5
  downscale:
    p: 0.5
    scale: 0.2
  blur:
    p: 0.5
    blur_limit: 10
  gaussnoise:
    p: 0.5
    var_limit: 10
  colorjitter:
    p: 0.5
    scale_setting: 0.25
    scale_color: 0.1
  superpixels:
    p: 0.5
  zoomblur:
    p: 0.5
  randomsizedcrop:
    p: 0.5
  elastictransform:
    p: 0.5
  normalize:
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

eval_checkpoint: "latest_checkpoint.pth"