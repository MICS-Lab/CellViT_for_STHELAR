logging:
  mode: "offline"
  project: "sthelar20x_tonsil"
  notes: "CellViT fine-tuning on STHELAR 20x tonsil auto split, pretrained sanity check on Ruche"
  log_comment: "sthelar20x_tonsil_auto_500_bm64_pretrained_ruche"
  wandb_dir: "run/sthelar20x_tonsil_auto_500_bm64_pretrained_ruche"
  log_dir: "run/sthelar20x_tonsil_auto_500_bm64_pretrained_ruche/log"
  log_images: False

gpu: 0

data:
  dataset: "PanNuke"
  dataset_path: "/gpfs/workdir/taddeial/workspace/Datasets/cellvit_ready/sthelar20x_tonsil_auto"
  train_folds: [0]
  val_folds: [1]
  test_folds: [2]
  num_nuclei_classes: 5
  num_tissue_classes: 1
  input_shape: 256

model:
  backbone: "SAM-H"
  pretrained_encoder: "models/pretrained/sam_vit_h.pth"
  pretrained: "models/pretrained/CellViT-SAM-H-x40.pth"
  embed_dim: 1280
  input_channels: 3
  depth: 32
  num_heads: 16
  extract_layers: 4
  shared_decoders: False

training:
  batch_size: 4
  epochs: 1
  unfreeze_epoch: 2
  optimizer: "AdamW"
  optimizer_hyperparameter:
    lr: 0.0001
    betas: [0.85, 0.85]
  early_stopping_patience: 10
  scheduler:
    scheduler_type: "exponential"
  sampling_strategy: "cell"
  sampling_gamma: 0.85
  mixed_precision: True
  eval_every: 1